version: '3.8'

services:
  pateint-service:
    build:
      context: ./PateintService
      dockerfile: Dockerfile
    container_name: pateint_service
    ports:
      - "4001:4001"
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}